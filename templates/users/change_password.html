{% extends "base.html" %}
{% block title %}Change Password - Linux Manager{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Change Password: {{ username }}</h1>
    <a href="{{ url_for('users.index') }}" class="btn btn-sm">Back</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" class="form" id="changePasswordForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <div class="password-input-group">
                    <input type="password" id="password" name="password" placeholder="New password" required>
                    <button type="button" class="btn btn-sm btn-info" id="generatePasswordBtn">Generate</button>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <small class="form-text" id="passwordFeedback"></small>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Change Password</button>
                <a href="{{ url_for('users.index') }}" class="btn">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/users.js') }}"></script>
{% endblock %}
