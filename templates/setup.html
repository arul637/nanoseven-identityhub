{% extends "base.html" %}
{% block title %}Setup - Linux Manager{% endblock %}
{% block body_start %}
<div class="gradient-bg">
    <div class="g-circle"></div>
    <div class="g-circle"></div>
    <div class="g-circle"></div>
    <div class="g-circle"></div>
</div>
{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Initial Setup</h1>
        <p class="auth-subtitle">Create the first administrator account</p>
        <form method="POST" action="{{ url_for('auth.setup') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Administrator Username</label>
                <input type="text" id="username" name="username" placeholder="Admin username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Strong password (min 8 chars)" required>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Admin</button>
        </form>
    </div>
</div>
{% endblock %}
